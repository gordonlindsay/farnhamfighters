<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farnham Fighters</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <div id="controls">
        <div class="ctrl-col">
            <h3>P1 Controls</h3>
            <span>WASD — Move/Jump</span>
            <span>Space — Melee</span>
            <span>Ctrl — Ranged</span>
            <span>Shift — Block</span>
            <span>G — Special</span>
            <span>Q / E — Companion</span>
        </div>
        <div class="ctrl-col">
            <h3>P2 Controls (VS)</h3>
            <span>Arrows — Move/Jump</span>
            <span>Num . — Melee</span>
            <span>Num Enter — Ranged</span>
            <span>Num 0 — Block</span>
            <span>Num + — Special</span>
            <span>Num 7 / 9 — Companion</span>
        </div>
        <div class="ctrl-col">
            <h3>General</h3>
            <span>M — Sound On/Off</span>
            <span>N — Music On/Off</span>
            <span>P / Esc — Pause</span>
        </div>
    </div>
    <script src="game.js?v=33"></script>
</body>
</html>
